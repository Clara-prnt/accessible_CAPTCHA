name: 🧪 Unit and E2E Tests (Security and UI Checks)

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jest:
    name: 🔎 Jest unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm run test -- --ci --runInBand

  playwright:
    name: 🖥️ Playwright E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: jest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  security-bot-check:
    name: 🤖 Security bot check
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Start PHP and run anti-bot tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $phpOut = Join-Path $PWD 'php-server.out.log'
          $phpErr = Join-Path $PWD 'php-server.err.log'

          $phpProcess = Start-Process php -ArgumentList '-S 127.0.0.1:8000 -t .' -PassThru -RedirectStandardOutput $phpOut -RedirectStandardError $phpErr

          try {
            $serverReady = $false
            for ($i = 1; $i -le 20; $i++) {
              Start-Sleep -Seconds 1
              try {
                $probe = Invoke-WebRequest -Uri 'http://127.0.0.1:8000/backend/InitCaptcha.php' -Method GET -TimeoutSec 3
                if ($probe.StatusCode -ge 200) {
                  $serverReady = $true
                  break
                }
              } catch {
                if ($_.Exception.Response -and [int]$_.Exception.Response.StatusCode.value__ -eq 405) {
                  $serverReady = $true
                  break
                }
              }
            }

            if (-not $serverReady) {
              Write-Host 'PHP server did not become ready in time.'
              if (Test-Path $phpOut) { Get-Content $phpOut -ErrorAction SilentlyContinue }
              if (Test-Path $phpErr) { Get-Content $phpErr -ErrorAction SilentlyContinue }
              exit 1
            }

            $securityScript = Join-Path $PWD 'tests\security-bot-check.ps1'
            if (-not (Test-Path $securityScript)) {
              Write-Host "Security script not found at: $securityScript"
              exit 1
            }

            & $securityScript -BaseUrl "http://127.0.0.1:8000/backend" -ResetRateLimit -ReportPath ".\security-bot-check-report.txt"
          }
          finally {
            if ($phpProcess -and -not $phpProcess.HasExited) {
              Stop-Process -Id $phpProcess.Id -Force
            }
          }

      - name: Upload security test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-bot-check-artifacts
          path: |
            security-bot-check-report.txt
            php-server.out.log
            php-server.err.log
          if-no-files-found: ignore

